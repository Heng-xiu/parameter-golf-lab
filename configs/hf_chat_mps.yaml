model:
  vocab_size: 256
  n_layers: 4
  d_model: 128
  n_heads: 4
  n_kv_heads: 2
  mlp_ratio: 4
  max_seq_len: 384
  dropout: 0.0
  tie_embeddings: true
train:
  data_path: data/hf_chat.txt
  output_dir: outputs/hf_chat_mps
  batch_size: 8
  seq_len: 192
  max_steps: 2500
  lr: 0.002
  seed: 17
  device: auto
  log_every: 50
