model:
  vocab_size: 256
  n_layers: 3
  d_model: 96
  n_heads: 4
  n_kv_heads: 2
  mlp_ratio: 4
  max_seq_len: 256
  dropout: 0.0
  tie_embeddings: true
train:
  data_path: data/tiny_chat.txt
  output_dir: outputs/chat_tiny_mps
  batch_size: 8
  seq_len: 128
  max_steps: 1200
  lr: 0.003
  seed: 13
  device: auto
  log_every: 50
