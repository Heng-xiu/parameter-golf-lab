model:
  vocab_size: 256
  n_layers: 2
  d_model: 64
  n_heads: 4
  n_kv_heads: 4
  mlp_ratio: 4
  max_seq_len: 128
  dropout: 0.0
  tie_embeddings: true
train:
  data_path: data/tiny.txt
  output_dir: outputs/baseline
  batch_size: 4
  seq_len: 64
  max_steps: 80
  lr: 0.003
  seed: 7
  device: auto
  log_every: 10
